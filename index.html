    async function fetchWithProxy(url) {
      try {
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('Direct fetch failed');
        return await resp.json();
      } catch (e) {
        const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
        const resp = await fetch(proxyUrl);
        if (!resp.ok) throw new Error('Proxy fetch failed');
        return await resp.json();
      }
    }
    async function getVerseText(reference) {
      try {
        const resp = await fetch(`https://bible-api.com/${encodeURIComponent(reference)}?translation=kjv`);
        const data = await resp.json();
        return data.text || '';
      } catch { return ''; }
    }
    function generateLifeSections(tribeName, saintName, watchData, name) {
      const sections = [
        { area: "1. Spiritual Life", message: `Like the tribe of ${tribeName}, God calls you to root your faith deeply in prayer. Your patron, ${saintName}, intercedes for you. Let your daily watch (${watchData.watch}) remind you that every hour is sacred.` },
        { area: "2. Relationships & Family", message: `The blessing of ${tribeName} flows into your home. God desires you to nurture love, forgiveness, and loyalty — as ${saintName} lived in charity. Let the meal of the Last Supper (if you were born in the Evening Watch) or the women at the tomb inspire you to serve your loved ones.` },
        { area: "3. Vocation & Work", message: `The talent of the tribe of ${tribeName} was given for a purpose. ${saintName} found their calling; you are called to use your gifts in service. Whatever your hands find to do, do it for the Lord (Col 3:23).` },
        { area: "4. Health & Well‑being", message: `Honor your body as a temple of the Holy Spirit. ${saintName} often practiced fasting and self‑care as a path to holiness. The rhythm of the watches teaches balance — rest in the Lord and rise to meet each day.` },
        { area: "5. Community & Service", message: `The tribe of ${tribeName} was part of a larger people. God calls you beyond yourself — to serve the poor, the stranger, the Church. ${saintName} is proof that one life given to God can change the world.` }
      ];
      return sections;
    }
    function generateGodsWillSummary(tribeName, saintName, watchData, name) {
      return `God wants you, ${name || 'beloved'}, to walk in the strength of ${tribeName}, with the companionship of ${saintName}, and the prayerful spirit of the ${watchData.watch}. Love mercy, act justly, and walk humbly with your God (Micah 6:8).`;
    }

    // --- Main action (unchanged) ---
    document.getElementById('userForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const dob = document.getElementById('dob').value;
      const tob = document.getElementById('tob').value;

      const submitBtn = document.getElementById('submitBtn');
      const loader = document.getElementById('loader');
      const resultDiv = document.getElementById('result');
      const inputCard = document.getElementById('inputCard');

      submitBtn.disabled = true;
      loader.style.display = 'block';
      resultDiv.style.display = 'none';

      try {
        const [year, month, day] = dob.split('-');
        const hebcalUrl = `https://www.hebcal.com/converter?cfg=json&gy=${year}&gm=${month}&gd=${day}&g2h=1`;
        const hebData = await (await fetch(hebcalUrl)).json();
        const hebrewMonth = hebData.hm;
        const tribeInfo = getTribeData(hebrewMonth);
        if (!tribeInfo) throw new Error('Could not determine biblical sign.');

        // Saint: try API, then offline
        let saintOfDay = null;
        const dateKey = `${month}-${day}`;
        const offlineSaint = saintCalendar[dateKey] || null;
        const calapiUrl = `http://calapi.inadiutorium.cz/api/v0/en/calendars/general-en/${year}/${month}/${day}`;
        try {
          const calData = await fetchWithProxy(calapiUrl);
          if (calData.celebrations && calData.celebrations.length > 0) {
            saintOfDay = calData.celebrations[0].title;
          }
        } catch (apiErr) { console.warn('Calapi not available, using offline calendar.'); }
        if (!saintOfDay) saintOfDay = offlineSaint || 'Unknown saint';

        // Name saint
        const nameKey = name.toLowerCase().split(' ')[0];
        const nameSaint = nameSaintMap[nameKey] || null;

        // Birth watch
        let watchHour = 0;
        if (tob) {
          const [h, m] = tob.split(':').map(Number);
          watchHour = h + (m / 60);
        } else { watchHour = 12; }
        const watchData = getWatchData(Math.floor(watchHour));
        const verseText = await getVerseText(watchData.verse);
        watchData.verseText = verseText;

        // Build UI
        document.getElementById('tribeCard').innerHTML = `
          <h3>🐑 Your Biblical Sign</h3>
          <div class="tribe-emblem">${tribeInfo.emblem}</div>
          <p><strong>Tribe of ${tribeInfo.tribe}</strong> (Month: ${hebrewMonth})</p>
          <p><span class="gem-stone" style="background:${tribeInfo.color};"></span> Gemstone: ${tribeInfo.stone}</p>
          <p class="verse">“${tribeInfo.blessing}”</p>
        `;
        let saintHtml = `<h3>🕊️ Your Patron Saint</h3><p><strong>Birthday Saint:</strong> ${saintOfDay}</p>`;
        if (nameSaint) saintHtml += `<p><strong>Name Saint:</strong> ${nameSaint}</p>`;
        else saintHtml += `<p class="small-note">No specific name‑saint found. Your birthday saint is your special patron!</p>`;
        document.getElementById('saintCard').innerHTML = saintHtml;
        document.getElementById('watchCard').innerHTML = `
          <h3>⏳ Your Birth Watch</h3>
          <p><strong>${watchData.watch}</strong> (${watchData.time})</p>
          <p>${watchData.event} – Patron: ${watchData.saint}</p>
          <p class="verse">${watchData.verse}: "${watchData.verseText || '...'}"</p>
        `;
        const lifeSections = generateLifeSections(tribeInfo.tribe, saintOfDay, watchData, name);
        const godsWill = generateGodsWillSummary(tribeInfo.tribe, saintOfDay, watchData, name);
        let lifeHtml = `<h3>🌿 5 Sections of Life & What God Wants From You</h3>`;
        lifeSections.forEach(section => {
          lifeHtml += `<div class="life-section"><h4>${section.area}</h4><p>${section.message}</p></div>`;
        });
        lifeHtml += `<div class="god-wants">✨ <strong>What God wants from you:</strong> ${godsWill}</div>`;
        document.getElementById('lifeCard').innerHTML = lifeHtml;

        inputCard.style.display = 'none';
        resultDiv.style.display = 'block';
        loader.style.display = 'none';

      } catch (error) {
        alert('Something went wrong: ' + error.message);
        loader.style.display = 'none';
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
